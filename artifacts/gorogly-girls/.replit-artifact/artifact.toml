kind = "web"
previewPath = "/"
title = "Görogly Girls Fitness Club"
version = "1.0.0"
id = "artifacts/gorogly-girls"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25172

[services.development]
run = "pnpm --filter @workspace/gorogly-girls run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gorogly-girls", "run", "build" ]
publicDir = "artifacts/gorogly-girls/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25172"
BASE_PATH = "/"
